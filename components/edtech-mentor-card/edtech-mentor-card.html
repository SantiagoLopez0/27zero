<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EdTech Mentor Card — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<style>
  :root {
    --color-indigo: #440E92;
    --color-purple: #B382F9;
    --color-black:  #101010;
    --color-gray:   #F5F5F5;
    --color-white:  #FFFFFF;
    --space-xs:  0.5em;
    --space-sm:  1.5em;
    --space-md:  3em;
    --space-lg:  6em;
    --space-xl:  9em;
    --space-2xl: 14em;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-color: #101010;
    color: var(--color-white);
    padding: 3em;
  }
  @media (max-width: 767px) { body { font-size: 9px; } }
</style>
<link rel="stylesheet" href="/components/work-card/work-card.css">
<link rel="stylesheet" href="/components/edtech-mentor-card/edtech-mentor-card.css">
</head>
<body>

<a href="#" class="card card--edtech-mentor">
  <div class="card-edtech-mentor-header">
    <div class="card-edtech-mentor-avatar"><span>JK</span></div>
    <div class="card-edtech-mentor-meta">
      <span class="card-edtech-mentor-role">Founder At Kelleher Consulting Group</span>
      <span class="card-edtech-mentor-name">Julie Kelleher</span>
    </div>
  </div>

  <div class="card-edtech-mentor-body">
    <span class="card-edtech-mentor-tag">Tag</span>
    <div class="card-edtech-mentor-footer">
      <h3 class="card-edtech-mentor-title">A Market-First Mindset in EdTech: Julie Kelleher's Blueprint for Success</h3>
      <div class="card-edtech-mentor-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="7" y1="17" x2="17" y2="7"></line>
          <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
      </div>
    </div>
  </div>

</html>
