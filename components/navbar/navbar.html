<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* Tokens globales del design system — ver /design-system.md */
  :root {
    --color-indigo: #440E92;
    --color-purple: #B382F9;
    --color-black:  #101010;
    --color-gray:   #F5F5F5;
    --color-white:  #FFFFFF;
    --space-xs:  0.5em;
    --space-sm:  1.5em;
    --space-md:  3em;
    --space-lg:  6em;
    --space-xl:  9em;
    --space-2xl: 14em;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-color: var(--color-white);
    color: var(--color-black);
  }
  @media (max-width: 767px) { body { font-size: 9px; } }

  /* Base .btn — requerida por .btn-nav */
  .btn {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5em;
    padding: 0.85em 1.7em;
    border-radius: 5.2em;
    border: 0.05em solid transparent;
    font-family: 'Lora', serif;
    font-size: 1.15em;
    font-style: normal;
    font-weight: 400;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  /* Spacer solo para poder probar el estado nav--scrolled en esta vista aislada */
  .scroll-spacer { height: 200vh; }
</style>
<link rel="stylesheet" href="/components/navbar/navbar.css">
</head>
<body>

<header class="nav nav--white">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <img src="https://cdn.prod.website-files.com/65144cb53e0e9c74de079e3b/65144ded0328ecd5efb8b691_Logo.svg" alt="27zero">
    </a>
    <nav class="nav-links">
      <div class="nav-dropdown">
        <button class="nav-dropdown-toggle" aria-expanded="false">
          Work
          <svg class="nav-dropdown-chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="nav-dropdown-content">
          <a href="/work?view=projects" class="nav-dropdown-link">by projects</a>
          <div class="nav-dropdown-divider"></div>
          <a href="/work?view=clients" class="nav-dropdown-link">by clients</a>
        </div>
      </div>
      <a href="/edtech-marketing">Edtech Marketing</a>
      <a href="/the-edtech-mentor">The EdTech Mentor</a>
      <a href="/resources">Resources</a>
      <a href="/about">About</a>
    </nav>
    <a href="/contact" class="btn btn-nav">Let's Talk!</a>

    <!-- Hamburger — solo visible en mobile (<=991px). Ícono estático, sin animación -->
    <button class="nav-hamburger" aria-label="Abrir menú" aria-expanded="false">
      <svg class="nav-hamburger-icon" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <line x1="3" y1="7" x2="21" y2="7"></line>
        <line x1="3" y1="12" x2="21" y2="12"></line>
        <line x1="3" y1="17" x2="21" y2="17"></line>
      </svg>
    </button>
  </div>

  <!-- Modal mobile fullscreen — siempre blanco, con su propio header (logo + close),
       independiente del estado/posición del .nav (evita conflictos con nav--scrolled) -->
  <div class="nav-mobile-menu" id="navMobileMenu">
    <div class="nav-mobile-header">
      <a href="/" class="nav-mobile-logo">
        <img src="https://cdn.prod.website-files.com/65144cb53e0e9c74de079e3b/65144ded0328ecd5efb8b691_Logo.svg" alt="27zero">
      </a>
      <button class="nav-mobile-close" aria-label="Cerrar menú">
        <svg width="20" height="20" viewBox="0 0 20 20" fill="none" xmlns="http://www.w3.org/2000/svg">
          <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="2"></line>
          <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="2" transform="rotate(45 10 10)"></line>
          <line x1="3" y1="10" x2="17" y2="10" stroke="currentColor" stroke-width="2" transform="rotate(135 10 10)"></line>
        </svg>
      </button>
    </div>

    <nav class="nav-mobile-links">
      <div class="nav-mobile-group">
        <button class="nav-mobile-group-toggle" aria-expanded="false">
          Work
          <svg class="nav-mobile-group-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"></polyline>
          </svg>
        </button>
        <div class="nav-mobile-group-content">
          <div class="nav-mobile-group-inner">
            <a href="/work?view=projects" class="nav-mobile-sublink">by projects</a>
            <a href="/work?view=clients" class="nav-mobile-sublink">by Clients</a>
          </div>
        </div>
      </div>
      <a href="/edtech-marketing" class="nav-mobile-link">Edtech Marketing</a>
      <a href="/the-edtech-mentor" class="nav-mobile-link">The EdTech Mentor</a>
      <a href="/resources" class="nav-mobile-link">Resources</a>
      <a href="/about" class="nav-mobile-link">About</a>
    </nav>
    <a href="/contact" class="btn btn-nav">Let's Talk!</a>
  </div>
</header>

<div class="scroll-spacer"></div>

<script src="/components/navbar/navbar.js"></script>
</body>
</html>
