<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Navbar — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  /* Tokens globales del design system — ver /design-system.md */
  :root {
    --color-indigo: #440E92;
    --color-purple: #B382F9;
    --color-black:  #101010;
    --color-gray:   #F5F5F5;
    --color-white:  #FFFFFF;
    --space-xs:  0.5em;
    --space-sm:  1.5em;
    --space-md:  3em;
    --space-lg:  6em;
    --space-xl:  9em;
    --space-2xl: 14em;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-color: var(--color-white);
    color: var(--color-black);
  }
  @media (max-width: 767px) { body { font-size: 9px; } }

  /* Base .btn — requerida por .btn-nav */
  .btn {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5em;
    padding: 0.85em 1.7em;
    border-radius: 5.2em;
    border: 0.05em solid transparent;
    font-family: 'Lora', serif;
    font-size: 1.15em;
    font-style: normal;
    font-weight: 400;
    line-height: 1.2;
    text-align: center;
    text-decoration: none;
    transition: all 0.2s ease;
    cursor: pointer;
  }

  /* Spacer solo para poder probar el estado nav--scrolled en esta vista aislada */
  .scroll-spacer { height: 200vh; }
</style>
<link rel="stylesheet" href="/components/navbar/navbar.css">
</head>
<body>

<header class="nav nav--white">
  <div class="nav-container">
    <a href="/" class="nav-logo">
      <img src="https://cdn.prod.website-files.com/65144cb53e0e9c74de079e3b/65144ded0328ecd5efb8b691_Logo.svg" alt="27zero">
    </a>
    <nav class="nav-links">
      <a href="/work">Work</a>
      <a href="/edtech-marketing">Edtech Marketing</a>
      <a href="/the-edtech-mentor">The EdTech Mentor</a>
      <a href="/resources">Resources</a>
      <a href="/about">About</a>
    </nav>
    <a href="/contact" class="btn btn-nav">Let's Talk!</a>

    <!-- Hamburger — solo visible en mobile (<=767px) -->
    <button class="nav-hamburger" aria-label="Abrir menú" aria-expanded="false">
      <div class="nav-hamburger-icon"></div>
    </button>
  </div>

  <!-- Dropdown mobile — hereda el color de la variante activa del nav -->
  <div class="nav-mobile-menu" id="navMobileMenu">
    <nav class="nav-mobile-links">
      <a href="/work">Work</a>
      <a href="/edtech-marketing">Edtech Marketing</a>
      <a href="/the-edtech-mentor">The EdTech Mentor</a>
      <a href="/resources">Resources</a>
      <a href="/about">About</a>
    </nav>
    <a href="/contact" class="btn btn-nav">Let's Talk!</a>
  </div>
</header>

<div class="scroll-spacer"></div>

<script src="https://cdn.jsdelivr.net/npm/lottie-web@5.12.2/build/player/lottie.min.js"></script>
<script src="/components/navbar/navbar.js"></script>
</body>
</html>
