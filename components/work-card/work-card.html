<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Card — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-indigo: #440E92;
    --color-purple: #B382F9;
    --color-black:  #101010;
    --color-gray:   #F5F5F5;
    --color-white:  #FFFFFF;
    --space-xs:  0.5em;
    --space-sm:  1.5em;
    --space-md:  3em;
    --space-lg:  6em;
    --space-xl:  9em;
    --space-2xl: 14em;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-color: var(--color-white);
    color: var(--color-black);
    padding: 3em;
  }
  @media (max-width: 767px) { body { font-size: 9px; } }
</style>
<link rel="stylesheet" href="/components/work-card/work-card.css">
</head>
<body>

<a href="#" class="card card--work">
  <div class="card-work-bg">
    <span>[PROJECT THUMBNAIL]</span>
  </div>
  <div class="card-work-body">
    <div class="card-work-content">
      <span class="card-work-eyebrow">[UX/UI &amp; WEB DESIGN]</span>
      <h3 class="card-work-title">[Project headline]</h3>
      <div class="card-work-client">
        <div class="card-work-client-logo"><span>CL</span></div>
        <span class="card-work-client-name">[CLIENT NAME]</span>
      </div>
    </div>
    <div class="card-work-footer">
      <div class="card-work-arrow">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <line x1="7" y1="17" x2="17" y2="7"></line>
          <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
      </div>
    </div>
  </div>
</a>

</body>
</html>
