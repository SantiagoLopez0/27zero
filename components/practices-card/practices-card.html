<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practices Card — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --color-indigo: #440E92;
    --color-purple: #B382F9;
    --color-black:  #101010;
    --color-gray:   #F5F5F5;
    --color-white:  #FFFFFF;
    --space-xs:  0.5em;
    --space-sm:  1.5em;
    --space-md:  3em;
    --space-lg:  6em;
    --space-xl:  9em;
    --space-2xl: 14em;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Inter', sans-serif;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    background-color: var(--color-indigo);
    padding: 3em;
  }
  @media (max-width: 768px) { body { font-size: 9px; } }

  /* text-body--sm — clase base compartida del design system global */
  .text-body--sm {
    font-family: 'Inter', sans-serif;
    font-size: 1.07em;
    font-weight: 400;
    line-height: 1.6;
    letter-spacing: 0;
  }
</style>
<link rel="stylesheet" href="/components/practices-card/practices-card.css">
</head>
<body>

<a href="#" class="practices-card">
  <div class="practices-card-bg">
    <span>[image]</span>
  </div>

  <div class="practices-card-block practices-card-block--intro">
    <div class="practices-card-icon">
      <svg width="59" height="39" viewBox="0 0 59 39" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M38.87 38.86L38.55 24.46C35.42 33.03 28.46 38.75 19.35 38.86L19.06 25.09C15.51 33.29 9.14 38.7 0 38.87V-1.0866e-05C8.93 -0.0700109 15.41 5.42999 19.06 13.54L19.39 0.0299891C28.16 -0.140011 35.55 5.67999 38.5 14.47L38.8 0.00998913C49.45 -0.100011 58.13 8.57999 58.2 19.23C58.27 29.58 50.19 38.58 38.86 38.85L38.87 38.86Z" fill="black"/>
      </svg>
    </div>
    <div class="practices-card-text">
      <h3 class="practices-card-title">Customer Marketing</h3>
      <p class="practices-card-body text-body--sm">Turning communities into growth engines. Peer-driven storytelling strengthens credibility because people trust those who share their experiences.</p>
    </div>
  </div>

  <div class="practices-card-block practices-card-block--cta">
    <span class="practices-card-cta-text">Explore the practice</span>
    <div class="practices-card-arrow">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="7" y1="17" x2="17" y2="7"></line>
        <polyline points="7 7 17 7 17 17"></polyline>
      </svg>
    </div>
  </div>
</a>

</body>
</html>
