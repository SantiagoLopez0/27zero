<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work — 27zero</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/work/style.css">
</head>
<body>

<!-- HERO -->
<section class="section section--hero">
  <div class="container hero-container">
    <span class="text-eyebrow">Work: Behind the fastest-growing EdTech brands</span>
    <h1>Behind the fastest growing EdTech brands.</h1>
    <p class="text-body">First-hand expertise, innovative conceptual thinking &amp; design, client-first approach</p>
  </div>
</section>

<!-- FILTER PILLS -->
<section class="section section--pills">
  <div class="container pills-container">
    <div class="pills-wrap" id="pillsWrap">
      <button class="pill pill--active" data-filter="all">All</button>
      <button class="pill" data-filter="los-mejores">Los mejores</button>
      <button class="pill" data-filter="ux-ui-web-design">Ux/Ui &amp; Web Design</button>
      <button class="pill" data-filter="brand-messaging-strategy">Brand &amp; Messaging Strategy</button>
      <button class="pill" data-filter="events">Events</button>
      <button class="pill" data-filter="content-marketing">Content Marketing</button>
      <button class="pill" data-filter="marketing-programs">Marketing Programs</button>
      <button class="pill" data-filter="thought-leadership-programs">Thought Leadership Programs</button>
      <button class="pill" data-filter="strategic-services">Strategic Services</button>
    </div>
  </div>
</section>

<!-- SLIDERS -->
<section class="section section--sliders">
  <div class="sliders-container" id="slidersContainer">
    <!-- Generado por JS -->
  </div>
</section>

<script src="/work/script.js"></script>
</body>
</html>
